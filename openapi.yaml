openapi: 3.0.3
info:
  title: Veloura Order Service API
  version: 1.0.0
  description: Cart and order management API for the online clothing platform.
servers:
  - url: http://localhost:5001
tags:
  - name: Health
  - name: Cart
  - name: Orders
  - name: Admin
  - name: Legacy

paths:
  /:
    get:
      tags: [Health]
      summary: Service liveness check
      responses:
        "200":
          description: Service is running
          content:
            text/plain:
              schema:
                type: string
                example: Order Service Running

  /api/cart/add:
    post:
      tags: [Cart]
      summary: Add item to cart (or increase quantity)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/cart:
    get:
      tags: [Cart]
      summary: Get current user's cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart payload (empty cart if not created yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/cart/update:
    put:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/cart/remove:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveCartItemRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/cart/clear:
    delete:
      tags: [Cart]
      summary: Clear all cart items
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/orders:
    post:
      tags: [Orders]
      summary: Create order from provided items or DB cart
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Orders]
      summary: Get current user's orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User orders sorted by newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get one order for current user
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/orders/{id}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel a pending order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/orders:
    get:
      tags: [Admin]
      summary: Get all orders (shop_owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, pending, processing, shipped, delivered, cancelled]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrdersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/orders/{id}/status:
    patch:
      tags: [Admin]
      summary: Update an order status (shop_owner only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/order/create:
    post:
      tags: [Legacy]
      summary: Legacy create order endpoint
      deprecated: true
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/order/{id}:
    get:
      tags: [Legacy]
      summary: Legacy get order by ID endpoint
      deprecated: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    CartItem:
      type: object
      required: [productId, price, quantity]
      properties:
        productId:
          type: string
        productName:
          type: string
          default: ""
        brand:
          type: string
          default: ""
        category:
          type: string
          default: ""
        price:
          type: number
          format: float
          example: 49.99
        imageUrl:
          type: string
          default: ""
        selectedSize:
          type: string
          default: ""
        quantity:
          type: integer
          minimum: 1
          example: 2

    Cart:
      type: object
      required: [userId, items]
      properties:
        _id:
          type: string
        userId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShippingAddress:
      type: object
      properties:
        fullName:
          type: string
          default: ""
        address:
          type: string
          default: ""
        city:
          type: string
          default: ""
        postalCode:
          type: string
          default: ""
        phone:
          type: string
          default: ""

    OrderItem:
      allOf:
        - $ref: "#/components/schemas/CartItem"

    Order:
      type: object
      required: [userId, items, total, status]
      properties:
        _id:
          type: string
        userId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
          format: float
          example: 129.98
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          example: pending
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        paymentMethod:
          type: string
          default: card
          example: card
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddToCartRequest:
      type: object
      required: [productId, price]
      properties:
        productId:
          type: string
        productName:
          type: string
        brand:
          type: string
        category:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        selectedSize:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1

    UpdateCartItemRequest:
      type: object
      required: [productId, selectedSize, quantity]
      properties:
        productId:
          type: string
        selectedSize:
          type: string
        quantity:
          type: integer
          minimum: 1

    RemoveCartItemRequest:
      type: object
      required: [productId, selectedSize]
      properties:
        productId:
          type: string
        selectedSize:
          type: string

    CreateOrderRequest:
      type: object
      properties:
        items:
          type: array
          description: Optional. If omitted, server uses stored DB cart.
          items:
            $ref: "#/components/schemas/CartItem"
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        paymentMethod:
          type: string
          default: card

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]

    AdminOrdersResponse:
      type: object
      required: [orders, total, page, limit]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
          example: 34
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 15

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
