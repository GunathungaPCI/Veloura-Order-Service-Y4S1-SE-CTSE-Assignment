version: "3.9"

services:
  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veloura-order-service
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=5001
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: order-service-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
